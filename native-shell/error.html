<!doctype html>
<!-- Offline / can't-reach-server screen for the native shell. Self-contained on
     purpose: it must render with zero network. Styled to match the Streamflaire
     Console look (dark rail, Oxanium falls back to system sans offline). -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WorkBench</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background-color: #0c0f0c;
        background-image: radial-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 22px 22px;
        color: #fff;
        font-family: 'Oxanium', system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        text-align: center;
      }
      .wrap { max-width: 320px; }
      .mark {
        width: 56px; height: 56px; margin: 0 auto 20px;
        border: 1px solid rgba(34, 197, 94, 0.45);
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        display: flex; align-items: center; justify-content: center;
      }
      .kicker {
        font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
        text-transform: uppercase; color: #22c55e; margin-bottom: 10px;
      }
      h1 { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
      p { font-size: 14px; line-height: 1.55; color: rgba(255, 255, 255, 0.55); margin-bottom: 24px; }
      button {
        font: inherit; font-size: 14px; font-weight: 700;
        letter-spacing: 0.04em; text-transform: uppercase;
        color: #0c0f0c; background: #22c55e; border: 0;
        padding: 13px 30px; cursor: pointer;
        clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
      }
      button:active { background: #16a34a; }
      .status { margin-top: 14px; font-size: 12px; color: rgba(255, 255, 255, 0.35); min-height: 16px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <div class="kicker">Connection lost</div>
      <h1>Can't reach WorkBench</h1>
      <p>Check your internet connection and try again. Your data is safe on the server — nothing is lost.</p>
      <button id="retry" type="button">Retry</button>
      <div class="status" id="status"></div>
    </div>
    <script>
      var btn = document.getElementById('retry');
      var status = document.getElementById('status');
      function retry() {
        status.textContent = 'Reconnecting…';
        btn.disabled = true;
        // Probe first so a dead connection lands back here fast instead of
        // bouncing through a slow webview error cycle.
        // no-cors: this page runs on the shell's local origin, so a normal
        // fetch is CORS-blocked and would report "offline" even when online
        fetch('https://streamflaire.com/', { method: 'HEAD', cache: 'no-store', mode: 'no-cors' })
          .then(function () { window.location.href = 'https://streamflaire.com/app/dashboard'; })
          .catch(function () {
            status.textContent = 'Still offline — try again in a moment.';
            btn.disabled = false;
          });
      }
      btn.addEventListener('click', retry);
      // Auto-retry the moment the OS reports connectivity is back
      window.addEventListener('online', retry);
    </script>
  </body>
</html>
